<!DOCTYPE html>
<html>
    <head>
        <title>Catalogue</title>
        <link rel="stylesheet" href="catalogue.css">
    </head>
    <body>
        <div class="topnav" id="TopNav">
            <a class="active" href="index.html">Home</a>
            <a href="catalogue.html">Library Catalogue</a>
        </div>
        <form>
            <label for="title">Title: </label>
            <input type="text" id="title" name="title"><br>
            <label for="creator">Creator(s): </label>
            <input type="text" id="creator" name="creator"><br>
            <label for="date">Date:</label>
            <input type="date" id="date" name="date"><br>
            <label for="keywords">Keywords:</label>
            <input type="text" id="keywords" name="keywords"><br>
            <label for="description">Description:</label>
            <input type="text" id="description" name="description"><br>
            <label for="type">Type:</label>
            <input type="text" id="type" name="type"><br>
            <label for="contributor">Contributor(s):</label>
            <input type="text" id="contributor" name="contributor"><br>
            <label for="source">Source:</label>
            <input type="text" id="source" name="source"><br>
            <label for="language">Language:</label>
            <select id="language" name="language">
                <option value="English">English</option>
                <option value="French">French</option>
                <option value="Other">Other</option>
            </select><br>
            <label for="identifier">Identifier:</label>
            <input type="text" id="identifier" name="identifier"><br>
            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject"><br>
            <label for="format">Format:</label>
            <input type="text" id="format" name="format"><br>
            <label for="publisher">Publisher:</label>
            <input type="text" id="publisher" name="publisher"><br>
            <label for="rights">Rights:</label>
            <input type="text" id="rights" name="rights"><br>
            <button type="submit">Submit</button>
        </form>  
    </body>
</html>
